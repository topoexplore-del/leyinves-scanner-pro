<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Leyinves Scanner Pro</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Leyinves">
<meta name="theme-color" content="#0a0a0f">
<style>
:root{
  --bg:#0a0a0f; --bg2:#12131a; --bg3:#1a1c26; --border:rgba(255,255,255,.08);
  --txt:#e8e8ec; --txt2:#9a9aa6; --txt3:#5c5c68;
  --green:#00e676; --red:#ff5252; --amber:#ffc400; --cyan:#00e5ff;
  --accent:var(--amber); /* se tiñe con el régimen */
  --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,monospace;
  --sans:-apple-system,"SF Pro Text",system-ui,sans-serif;
  --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:14px;overscroll-behavior-y:contain}
body{padding-bottom:calc(64px + var(--safe-b))}

/* ── Cabecera con franja de régimen (la firma de la app) ── */
header{position:sticky;top:0;z-index:50;background:rgba(10,10,15,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding-top:var(--safe-t)}
.regime-strip{height:3px;background:var(--accent);transition:background .4s}
.hdr-row{display:flex;align-items:center;gap:8px;padding:10px 14px 8px}
.logo{font-family:var(--mono);font-weight:800;font-size:15px;letter-spacing:.5px}
.logo small{color:var(--accent);font-weight:600}
.hdr-spacer{flex:1}
.upd{font-family:var(--mono);font-size:9px;color:var(--txt3);text-align:right;line-height:1.3}
.btn-refresh{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--txt2);font-size:15px;display:flex;align-items:center;justify-content:center}
.btn-refresh.spin{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.regime-chip{display:flex;align-items:center;gap:8px;margin:0 14px 10px;padding:8px 12px;border:1px solid var(--accent);border-radius:10px;background:color-mix(in srgb,var(--accent) 8%,transparent);font-family:var(--mono);font-size:11px}
.regime-chip b{color:var(--accent)}
.regime-chip span{color:var(--txt2);font-size:10px}

/* ── Navegación inferior ── */
nav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;background:rgba(18,19,26,.95);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border);padding-bottom:var(--safe-b)}
nav button{flex:1;padding:9px 0 7px;background:none;border:none;color:var(--txt3);font-family:var(--sans);font-size:9px;display:flex;flex-direction:column;align-items:center;gap:3px}
nav button .ico{font-size:18px;line-height:1}
nav button.on{color:var(--accent)}

/* ── Contenido ── */
main{padding:12px 14px}
section{display:none}section.on{display:block}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
.card h3{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--txt3);margin-bottom:10px;font-weight:600}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.kpi{background:var(--bg3);border-radius:10px;padding:10px 8px;text-align:center}
.kpi b{display:block;font-family:var(--mono);font-size:18px;font-weight:700}
.kpi span{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
.up{color:var(--green)}.dn{color:var(--red)}.am{color:var(--amber)}.cy{color:var(--cyan)}.mut{color:var(--txt3)}

/* ── Filas de ticker ── */
.search{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg2);color:var(--txt);font-size:15px;font-family:var(--mono);margin-bottom:10px;-webkit-appearance:none}
.search::placeholder{color:var(--txt3)}
.ghdr{display:flex;align-items:center;justify-content:space-between;padding:12px 4px 6px;font-size:11px;color:var(--txt2);font-weight:600}
.ghdr small{color:var(--txt3);font-family:var(--mono);font-weight:400}
.trow{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:6px}
.trow .tk{width:62px;flex-shrink:0}
.trow .tk b{font-family:var(--mono);font-size:14px;display:block}
.trow .tk span{font-size:8px;color:var(--txt3);text-transform:uppercase;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:62px}
.trow .mid{flex:1;min-width:0}
.mbars{display:flex;gap:4px;margin-top:4px}
.mbar{flex:1;height:14px;border-radius:4px;background:var(--bg3);position:relative;overflow:hidden}
.mbar i{position:absolute;top:0;bottom:0;border-radius:4px}
.mbar em{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-style:normal;font-family:var(--mono);font-size:8px;color:var(--txt)}
.badges{display:flex;gap:5px;flex-wrap:wrap}
.bdg{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:5px;background:var(--bg3);color:var(--txt2)}
.bdg.st-ENTRY,.bdg.st-ENTRYp{background:rgba(0,230,118,.15);color:var(--green)}
.bdg.st-ACCUM{background:rgba(255,196,0,.13);color:var(--amber)}
.trow .sc{width:44px;flex-shrink:0;text-align:right}
.trow .sc b{font-family:var(--mono);font-size:17px;display:block}
.trow .sc span{font-size:8px;color:var(--txt3)}

/* ── Modal de detalle ── */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;display:none}
.sheet{position:fixed;left:0;right:0;bottom:0;max-height:88vh;overflow-y:auto;background:var(--bg2);border-radius:20px 20px 0 0;border-top:1px solid var(--border);z-index:91;display:none;padding:8px 16px calc(24px + var(--safe-b));-webkit-overflow-scrolling:touch}
.sheet.on,.sheet-bg.on{display:block}
.grip{width:38px;height:4px;border-radius:2px;background:var(--txt3);margin:6px auto 12px}
.sh-hdr{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.sh-hdr b{font-family:var(--mono);font-size:24px}
.sh-hdr .px{font-family:var(--mono);font-size:18px;color:var(--txt2)}
.sh-sub{font-size:11px;color:var(--txt3);margin-bottom:12px}
.dl{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.dl div{background:var(--bg3);border-radius:8px;padding:7px 10px}
.dl dt{font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3)}
.dl dd{font-family:var(--mono);font-size:13px;margin-top:2px}
.tvbox{border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-bottom:14px;background:var(--bg3)}
.note{font-size:10px;color:var(--txt3);line-height:1.5;margin-top:10px}

/* ── Tablas backtest ── */
table{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px}
th{font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--txt3);text-align:right;padding:5px 4px;border-bottom:1px solid var(--border)}
th:first-child,td:first-child{text-align:left}
td{padding:6px 4px;text-align:right;border-bottom:1px solid var(--border)}
.alert-card{border-left:3px solid var(--green)}
.empty{padding:30px 16px;text-align:center;color:var(--txt3);font-size:12px;line-height:1.6}
.err{margin:12px 0;padding:12px;border:1px solid var(--red);border-radius:12px;color:var(--red);font-size:12px;display:none}
.demo-warn{margin-bottom:12px;padding:10px 12px;border:1px solid var(--amber);border-radius:12px;color:var(--amber);font-size:11px;line-height:1.5}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="regime-strip" id="rstrip"></div>
  <div class="hdr-row">
    <div class="logo">LEYINVES <small>SCANNER</small></div>
    <div class="hdr-spacer"></div>
    <div class="upd" id="upd">cargando…</div>
    <button class="btn-refresh" id="brefresh" aria-label="Actualizar">⟳</button>
  </div>
  <div class="regime-chip" id="rchip" style="display:none"></div>
</header>

<main>
  <div class="err" id="err"></div>

  <!-- INICIO -->
  <section id="t-inicio" class="on"></section>
  <!-- RADAR -->
  <section id="t-radar">
    <input class="search" id="q" type="search" placeholder="Buscar ticker o sector…" autocomplete="off">
    <div id="radar-list"></div>
  </section>
  <!-- TOP -->
  <section id="t-top"></section>
  <!-- BACKTEST -->
  <section id="t-bt"></section>
  <!-- ALERTAS -->
  <section id="t-alertas"></section>
</main>

<nav>
  <button data-t="inicio" class="on"><span class="ico">◉</span>Inicio</button>
  <button data-t="radar"><span class="ico">⌖</span>Radar</button>
  <button data-t="top"><span class="ico">▲</span>Top</button>
  <button data-t="bt"><span class="ico">∿</span>Backtest</button>
  <button data-t="alertas"><span class="ico">⚑</span>Alertas</button>
</nav>

<div class="sheet-bg" id="sheetbg"></div>
<div class="sheet" id="sheet"></div>

<script>
"use strict";
// ════════════════════════════════════════════════════════════════
// Leyinves Scanner Pro — app móvil
// Lee data/*.json del mismo repo (GitHub Pages). Todo el renderizado
// es DINÁMICO: nuevos grupos o campos que añadas en los .py aparecen
// aquí automáticamente, sin tocar la app.
// ════════════════════════════════════════════════════════════════
var snapshot=null, backtest=null, alerts=null, lastLoad=0;
var REFRESH_MS=60000; // sondeo cada 60 s — siempre la última versión publicada

function $(id){return document.getElementById(id)}
function pf(v,d){return v==null||isNaN(v)?"—":Number(v).toFixed(d==null?1:d)}
function cls(v,pos,neg){return v==null?"mut":v>=pos?"up":v<=neg?"dn":""}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]})}

// ── Carga de datos (red primero, cache-bust) ──
function fetchJson(name){
  return fetch("data/"+name+".json?v="+Date.now(),{cache:"no-store"})
    .then(function(r){if(!r.ok)throw new Error(name+".json: HTTP "+r.status);return r.json()});
}
function loadAll(manual){
  var b=$("brefresh");b.classList.add("spin");
  return Promise.allSettled([fetchJson("snapshot"),fetchJson("backtest"),fetchJson("alerts")])
  .then(function(rs){
    b.classList.remove("spin");$("err").style.display="none";
    if(rs[0].status==="fulfilled")snapshot=rs[0].value;
    else if(!snapshot){$("err").style.display="block";$("err").textContent="No se pudo cargar snapshot.json — "+rs[0].reason.message+". Verifica que GitHub Pages esté publicado y que el workflow haya corrido.";return}
    if(rs[1].status==="fulfilled")backtest=rs[1].value;
    if(rs[2].status==="fulfilled")alerts=rs[2].value;
    lastLoad=Date.now();
    renderHeader();renderAll();
  });
}
setInterval(function(){if(document.visibilityState==="visible")loadAll()},REFRESH_MS);
document.addEventListener("visibilitychange",function(){if(document.visibilityState==="visible"&&Date.now()-lastLoad>20000)loadAll()});
$("brefresh").addEventListener("click",function(){loadAll(true)});

// ── Cabecera: hora + régimen tiñe toda la app ──
function renderHeader(){
  var ts=snapshot.built_at?new Date(snapshot.built_at):null;
  $("upd").innerHTML="datos del cierre<br>"+(ts?ts.toLocaleString("es-CO",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}):"—");
  var mr=snapshot.market_regime, chip=$("rchip");
  var col=!mr?"var(--amber)":mr.regime==="BULL"?"var(--green)":mr.regime==="BEAR"?"var(--red)":"var(--amber)";
  document.documentElement.style.setProperty("--accent",col);
  if(mr){
    chip.style.display="flex";
    chip.innerHTML=(mr.icon||"")+" <b>"+esc(mr.regime)+(mr.demo?" · DEMO":"")+"</b> <span>"
      +(mr.demo?"ejecuta build_data.py para datos reales":"SPY "+(mr.spy_vs_sma200_pct>0?"+":"")+pf(mr.spy_vs_sma200_pct,1)+"% vs SMA200 · vol "+pf(mr.realized_vol_20d,0)+"%")+"</span>";
  }else{
    chip.style.display="flex";
    chip.innerHTML="⚠️ <b>SIN RÉGIMEN</b> <span>snapshot antiguo — corre build_data.py para activar métricas v18</span>";
  }
}

// ── Utilidades de datos ──
function allRows(){
  var out=[],seen={};
  if(!snapshot)return out;
  Object.keys(snapshot.groups||{}).forEach(function(g){
    (snapshot.groups[g]||[]).forEach(function(r){
      if(!seen[r.ticker]){seen[r.ticker]=1;r._g=g;out.push(r)}
    });
  });
  return out;
}

// ── INICIO ──
function renderInicio(){
  var rows=allRows(), mr=snapshot.market_regime;
  var nEntry=rows.filter(function(r){return r.state==="ENTRY"||r.state==="ENTRY+"}).length;
  var nMoat=rows.filter(function(r){return r.buffett>=75}).length;
  var nAl=(alerts&&alerts.confirmed)||0;
  var movers=rows.filter(function(r){return r.daily!=null}).sort(function(a,b){return Math.abs(b.daily)-Math.abs(a.daily)}).slice(0,6);
  var h="";
  if(snapshot.demo_note)h+='<div class="demo-warn">⚠️ '+esc(snapshot.demo_note)+'</div>';
  h+='<div class="card"><h3>Estado del mercado</h3>';
  if(mr&&!mr.demo){
    h+='<div class="kpis"><div class="kpi"><b style="color:var(--accent)">'+esc(mr.regime)+'</b><span>Régimen</span></div>'
      +'<div class="kpi"><b class="'+(mr.spy_vs_sma200_pct>0?"up":"dn")+'">'+(mr.spy_vs_sma200_pct>0?"+":"")+pf(mr.spy_vs_sma200_pct,1)+'%</b><span>SPY vs SMA200</span></div>'
      +'<div class="kpi"><b>'+pf(mr.realized_vol_20d,0)+'%</b><span>Volatilidad 20d</span></div></div>'
      +'<p class="note">'+esc(mr.advice||"")+'</p>';
  }else{
    h+='<p class="note">'+(mr&&mr.demo?"Régimen en modo DEMO. ":"")+"Corre el workflow <b>Full Refresh + Backtest</b> en GitHub Actions para calcular el régimen real, calidad Buffett y fuerza relativa.</p>";
  }
  h+='</div>';
  h+='<div class="card"><h3>Universo</h3><div class="kpis">'
    +'<div class="kpi"><b>'+rows.length+'</b><span>Tickers</span></div>'
    +'<div class="kpi"><b class="up">'+nEntry+'</b><span>En ENTRY</span></div>'
    +'<div class="kpi"><b class="'+(nAl?"up":"mut")+'">'+nAl+'</b><span>Alertas 4/4</span></div>'
    +'<div class="kpi"><b class="cy">'+nMoat+'</b><span>🏰 MOAT</span></div>'
    +'<div class="kpi"><b>'+Object.keys(snapshot.groups||{}).length+'</b><span>Grupos</span></div>'
    +'<div class="kpi"><b>'+(backtest&&backtest.results?backtest.results.length:"—")+'</b><span>Backtests</span></div>'
    +'</div></div>';
  h+='<div class="card"><h3>Mayores movimientos del día</h3>';
  movers.forEach(function(r){h+=rowHtml(r)});
  h+='</div>';
  $("t-inicio").innerHTML=h;bindRows("t-inicio");
}

// ── Fila de ticker (tarjeta compacta) ──
function microBar(label,v,lim){
  var pct=v==null?0:Math.max(-1,Math.min(1,v/lim));
  var col=v==null?"transparent":v>=0?"var(--green)":"var(--red)";
  var w=Math.abs(pct)*50;
  var st=pct>=0?"left:50%;width:"+w+"%":"right:50%;width:"+w+"%";
  return '<div class="mbar"><i style="'+st+';background:'+col+';opacity:.35"></i><em>'+label+" "+(v==null?"—":(v>0?"+":"")+pf(v,1))+'</em></div>';
}
function rowHtml(r){
  var bq=r.buffett, rsr=r.rs_rank;
  return '<div class="trow" data-t="'+esc(r.ticker)+'">'
    +'<div class="tk"><b>'+esc(r.ticker)+'</b><span>'+esc(r.sector||"")+'</span></div>'
    +'<div class="mid"><div class="badges">'
      +'<span class="bdg st-'+esc(String(r.state||"").replace("+","p"))+'">'+esc(r.state||"—")+'</span>'
      +'<span class="bdg">AI '+pf(r.ai,0)+'</span>'
      +(bq!=null?'<span class="bdg" style="color:'+(bq>=75?"var(--green)":bq>=55?"var(--txt)":"var(--red)")+'">🏰'+bq+'</span>':"")
      +(rsr!=null?'<span class="bdg" style="color:'+(rsr>=70?"var(--green)":rsr<40?"var(--red)":"var(--txt2)")+'">RS '+rsr+'</span>':"")
      +(r.mos!=null?'<span class="bdg '+(r.mos>0?"up":"dn")+'">MOS '+(r.mos>0?"+":"")+pf(r.mos,0)+'%</span>':"")
      +(r.earn_days!=null&&r.earn_days<=10?'<span class="bdg am">📅E-'+r.earn_days+'d</span>':"")
    +'</div><div class="mbars">'+microBar("1D",r.daily,5)+microBar("5D",r["5d"],10)+microBar("20D",r["20d"],15)+'</div></div>'
    +'<div class="sc"><b class="'+(r.score>=70?"up":r.score>=45?"":"dn")+'">'+(r.score!=null?r.score:"—")+'</b><span>$'+pf(r.close,2)+'</span></div>'
    +'</div>';
}
function bindRows(secId){
  document.querySelectorAll("#"+secId+" .trow").forEach(function(el){
    el.addEventListener("click",function(){openSheet(el.getAttribute("data-t"))});
  });
}

// ── RADAR (todos los grupos, dinámico) ──
function renderRadar(){
  var q=($("q").value||"").toLowerCase(), h="";
  Object.keys(snapshot.groups||{}).forEach(function(g){
    var rows=(snapshot.groups[g]||[]).filter(function(r){
      return !q||r.ticker.toLowerCase().indexOf(q)>=0||(r.sector||"").toLowerCase().indexOf(q)>=0||(r.name||"").toLowerCase().indexOf(q)>=0;
    });
    if(!rows.length)return;
    h+='<div class="ghdr"><span>'+esc(g)+'</span><small>'+rows.length+'</small></div>';
    rows.forEach(function(r){h+=rowHtml(r)});
  });
  $("radar-list").innerHTML=h||'<div class="empty">Sin resultados para «'+esc(q)+'»</div>';
  bindRows("t-radar");
}
$("q").addEventListener("input",renderRadar);

// ── TOP (rankings) ──
function topList(title,rows,fmt){
  var h='<div class="card"><h3>'+title+'</h3>';
  rows.forEach(function(r){h+=rowHtml(r)});
  return h+'</div>';
}
function renderTop(){
  var rows=allRows(), h="";
  var by=function(k){return rows.filter(function(r){return r[k]!=null}).sort(function(a,b){return b[k]-a[k]}).slice(0,8)};
  h+=topList("Top Score técnico",by("score"));
  h+=topList("Top 🏰 Calidad Buffett",by("buffett"));
  h+=topList("Top Fuerza Relativa vs SPY",by("rs_rank"));
  h+=topList("Top Margen de Seguridad",by("mos"));
  h+=topList("Top Upside proyectado",by("upside"));
  $("t-top").innerHTML=h;bindRows("t-top");
}

// ── BACKTEST ──
function btStat(s){if(!s||!s.n)return"<td class='mut'>—</td><td class='mut'>—</td><td class='mut'>—</td>";
  var net=s.avg_pnl_net!=null?s.avg_pnl_net:s.avg_pnl;
  var oos=s.wf&&s.wf.wr_oos!=null?s.wf.wr_oos:(s.wr_oos!=null?s.wr_oos:null);
  return"<td class='"+(s.win_rate>=55?"up":s.win_rate<45?"dn":"")+"'>"+pf(s.win_rate,0)+"%</td>"
    +"<td class='"+(net>0?"up":"dn")+"'>"+(net>0?"+":"")+pf(net,1)+"%</td>"
    +"<td class='"+(oos==null?"mut":oos>=55?"up":oos<45?"dn":"")+"'>"+(oos==null?"—":pf(oos,0)+"%")+"</td>";}
function renderBT(){
  if(!backtest||!backtest.results){$("t-bt").innerHTML='<div class="empty">backtest.json aún no existe.<br>Corre el workflow <b>Full Refresh + Backtest</b> en Actions.</div>';return}
  var h='<div class="card"><h3>Cómo leerlo</h3><p class="note">Compara contra el <b>baseline</b> (comprar sin filtro). <b>Neto</b> = P&L medio tras costos. <b>OOS</b> = win-rate en el 40% final del histórico que el sistema nunca "vio" al calibrar — el número que importa: si solo gana in-sample, está sobreajustado.</p></div>';
  var bm=backtest.meta&&backtest.meta.benchmark;
  if(bm)h+='<div class="card"><h3>Benchmark: el listón a superar</h3><div class="kpis">'
    +'<div class="kpi"><b class="'+(bm.cagr_pct>0?"up":"dn")+'">'+pf(bm.cagr_pct,1)+'%</b><span>CAGR SPY</span></div>'
    +'<div class="kpi"><b>'+pf(bm.total_return_pct,0)+'%</b><span>Total '+pf(bm.window_years,1)+' años</span></div>'
    +'<div class="kpi"><b class="dn">'+pf(bm.max_drawdown_pct,0)+'%</b><span>Max DD</span></div>'
    +'</div><p class="note">Si una estrategia no supera comprar SPY y no hacer nada (tras costos), no merece tu tiempo ni tu capital.</p></div>';
  var res=backtest.results.slice().sort(function(a,b){return(b.composite||0)-(a.composite||0)}).slice(0,40);
  res.forEach(function(r){
    var p="1m";
    var bl=r.baseline&&r.baseline[p], tc=r.tech_signals&&r.tech_signals[p], rg=r.regime_filtered&&r.regime_filtered[p];
    h+='<div class="card"><div class="sh-hdr" style="margin-bottom:8px"><b style="font-size:16px">'+esc(r.ticker)+'</b><span class="px" style="font-size:11px">CS '+(r.composite!=null?r.composite:"—")+'</span></div>';
    h+='<table><tr><th>Estrategia 1M</th><th>WR</th><th>Neto</th><th>OOS</th></tr>';
    h+='<tr><td class="mut">Baseline</td>'+btStat(bl)+'</tr>';
    h+='<tr><td>Técnica</td>'+btStat(tc)+'</tr>';
    h+='<tr><td>+ Régimen 🟢</td>'+btStat(rg)+'</tr></table>';
    if(bl&&tc&&bl.n&&tc.n){var edge=tc.win_rate-bl.win_rate;
      var sh=tc.sharpe_trade!=null?" · Sharpe "+pf(tc.sharpe_trade,2):"";
      var dd=tc.max_dd!=null?" · MaxDD "+pf(tc.max_dd,0)+"%":"";
      h+='<p class="note">Edge vs baseline: <b class="'+(edge>3?"up":edge<-3?"dn":"")+'">'+(edge>0?"+":"")+pf(edge,1)+' pts</b> ('+tc.n+' señales)'+sh+dd+'</p>';}
    h+='</div>';
  });
  $("t-bt").innerHTML=h;
}

// ── ALERTAS ──
function renderAlertas(){
  if(!alerts){$("t-alertas").innerHTML='<div class="empty">alerts.json aún no existe.<br>Corre el workflow de alertas en Actions.</div>';return}
  var h='<div class="card"><h3>Último chequeo</h3><p class="note">'+esc(alerts.checked_at||"—")
    +(alerts.note?'<br>'+esc(alerts.note):"")+'</p></div>';
  var sg=alerts.signals||[];
  if(sg.length){
    sg.forEach(function(s){
      var z=s.zones||{};
      h+='<div class="card alert-card"><div class="sh-hdr" style="margin-bottom:6px"><b style="font-size:18px">'+esc(s.ticker)+'</b><span class="px" style="font-size:12px">P(↑) '+pf(s.prob,0)+'%</span></div>';
      h+='<div class="dl">';
      h+='<div><dt>Entrada</dt><dd>$'+pf(z.entry,2)+'</dd></div><div><dt>Stop</dt><dd class="dn">$'+pf(z.sl,2)+'</dd></div>';
      h+='<div><dt>TP1</dt><dd class="up">$'+pf(z.tp1,2)+'</dd></div><div><dt>TP2</dt><dd class="up">$'+pf(z.tp2,2)+'</dd></div>';
      if(s.buffett!=null)h+='<div><dt>🏰 Buffett</dt><dd>'+s.buffett+'/100</dd></div>';
      if(s.mos!=null)h+='<div><dt>MOS</dt><dd class="'+(s.mos>0?"up":"dn")+'">'+(s.mos>0?"+":"")+pf(s.mos,0)+'%</dd></div>';
      if(s.rs_rank!=null)h+='<div><dt>RS</dt><dd>percentil '+s.rs_rank+'</dd></div>';
      h+='<div><dt>Composite</dt><dd>'+(s.composite!=null?s.composite:"—")+'</dd></div></div>';
      if(s.periods&&s.periods.length)h+='<p class="note">Horizontes con edge: '+esc(s.periods.join(", "))+'</p>';
      h+='</div>';
    });
  }else{
    h+='<div class="empty">Sin señales 4/4 confirmadas en el último chequeo.<br>La paciencia también es una posición.</div>';
  }
  if(alerts.watchlist&&alerts.watchlist.length){
    h+='<div class="card"><h3>Watchlist (3/4 — les falta una capa)</h3>';
    alerts.watchlist.forEach(function(w){h+='<p class="note" style="margin-top:4px"><b style="font-family:var(--mono);color:var(--txt)">'+esc(w.ticker)+'</b> · falla: '+esc((w.failed||[]).join(", "))+'</p>'});
    h+='</div>';
  }
  $("t-alertas").innerHTML=h;
}

// ── Detalle de ticker (sheet): conocidos + TODOS los campos extra ──
var KNOWN={ticker:1,name:1,sector:1,close:1,score:1,ai:1,state:1,abc:1,rsi:1,adx:1,ext:1,rel_vol:1,daily:1,"5d":1,"20d":1,pe:1,pe_gr:1,roe:1,roe_gr:1,roa:1,roa_gr:1,eps_g:1,eps_gr:1,fund:1,buffett:1,buffett_v:1,mos:1,rs_3m:1,rs_6m:1,rs_rank:1,atr:1,earn_days:1,earn_date:1,exdiv_date:1,target:1,upside:1,proj_conf:1,hessian:1,_g:1};
function dlItem(label,val,c){return '<div><dt>'+esc(label)+'</dt><dd class="'+(c||"")+'">'+val+'</dd></div>'}
function openSheet(tk){
  var r=allRows().filter(function(x){return x.ticker===tk})[0];if(!r)return;
  var h='<div class="grip"></div><div class="sh-hdr"><b>'+esc(r.ticker)+'</b><span class="px">$'+pf(r.close,2)+'</span></div>'
    +'<div class="sh-sub">'+esc(r.name||"")+' · '+esc(r.sector||"")+' · '+esc(r._g||"")+'</div>';
  // Gráfico en vivo (TradingView)
  h+='<div class="tvbox"><iframe loading="lazy" style="width:100%;height:220px;border:0" '
    +'src="https://s.tradingview.com/embed-widget/mini-symbol-overview/?locale=es#%7B%22symbol%22%3A%22'+encodeURIComponent(r.ticker)
    +'%22%2C%22dateRange%22%3A%226M%22%2C%22colorTheme%22%3A%22dark%22%2C%22isTransparent%22%3Atrue%2C%22autosize%22%3Atrue%7D"></iframe></div>';
  h+='<div class="dl">'
    +dlItem("Score",r.score!=null?r.score:"—",r.score>=70?"up":"")
    +dlItem("AI prob",pf(r.ai,0)+"%")
    +dlItem("Estado",esc(r.state||"—"),(r.state||"").indexOf("ENTRY")===0?"up":"")
    +dlItem("Estructura",esc(r.abc||"—"))
    +dlItem("RSI",pf(r.rsi,0))+dlItem("ADX",pf(r.adx,0))
    +dlItem("Vol relativo",pf(r.rel_vol,2)+"x")+dlItem("ATR",r.atr!=null?"$"+pf(r.atr,2):"—")
    +dlItem("1D",(r.daily>0?"+":"")+pf(r.daily,2)+"%",cls(r.daily,0.001,-0.001))
    +dlItem("20D",(r["20d"]>0?"+":"")+pf(r["20d"],2)+"%",cls(r["20d"],0.001,-0.001))
    +dlItem("🏰 Buffett",(r.buffett!=null?r.buffett+"/100 · ":"")+esc(r.buffett_v||"—"),r.buffett>=75?"up":r.buffett!=null&&r.buffett<35?"dn":"")
    +dlItem("Margen seguridad",r.mos!=null?(r.mos>0?"+":"")+pf(r.mos,0)+"%":"—",cls(r.mos,0.001,-0.001))
    +dlItem("RS vs SPY 3M",r.rs_3m!=null?(r.rs_3m>0?"+":"")+pf(r.rs_3m,1)+"%":"—",cls(r.rs_3m,0.001,-0.001))
    +dlItem("RS percentil",r.rs_rank!=null?r.rs_rank+" / 100":"—",r.rs_rank>=70?"up":"")
    +dlItem("P/E",pf(r.pe,1))+dlItem("ROE",r.roe!=null?pf(r.roe,0)+"%":"—")
    +dlItem("ROA",r.roa!=null?pf(r.roa,0)+"%":"—")+dlItem("EPS growth",r.eps_g!=null?pf(r.eps_g,0)+"%":"—")
    +dlItem("Fund. composite",r.fund!=null?r.fund:"—")
    +dlItem("Target",r.target?"$"+r.target+" ("+(r.upside>0?"+":"")+r.upside+"%)":"—",cls(r.upside,0.001,-0.001))
    +dlItem("📅 Earnings",r.earn_date?esc(r.earn_date)+(r.earn_days!=null?" ("+r.earn_days+"d)":""):"—",r.earn_days!=null&&r.earn_days<=5?"am":"")
    +dlItem("Ex-dividendo",r.exdiv_date?esc(r.exdiv_date):"—")
    +'</div>';
  // Campos NUEVOS añadidos en los .py → aparecen aquí solos
  var extra=Object.keys(r).filter(function(k){return !KNOWN[k]&&r[k]!=null&&typeof r[k]!=="object"});
  if(extra.length){
    h+='<div class="card" style="margin-top:4px"><h3>Otros campos del snapshot</h3><div class="dl">';
    extra.forEach(function(k){h+=dlItem(k,esc(String(r[k])))});
    h+='</div></div>';
  }
  if(r.hessian&&r.hessian.class)
    h+='<p class="note">Hessiano: '+esc(r.hessian.class)+' '+esc(r.hessian.icon||"")+' · det='+pf(r.hessian.det,4)+'</p>';
  h+='<p class="note">Datos del cierre ('+(snapshot.built_at?new Date(snapshot.built_at).toLocaleString("es-CO"):"—")+'). El gráfico de arriba sí es en vivo (TradingView).</p>';
  $("sheet").innerHTML=h;$("sheet").classList.add("on");$("sheetbg").classList.add("on");
}
$("sheetbg").addEventListener("click",function(){$("sheet").classList.remove("on");$("sheetbg").classList.remove("on")});

// ── Tabs ──
document.querySelectorAll("nav button").forEach(function(b){
  b.addEventListener("click",function(){
    document.querySelectorAll("nav button").forEach(function(x){x.classList.remove("on")});
    document.querySelectorAll("main section").forEach(function(x){x.classList.remove("on")});
    b.classList.add("on");$("t-"+b.getAttribute("data-t")).classList.add("on");
    renderAll();window.scrollTo(0,0);
  });
});
function renderAll(){
  if(!snapshot)return;
  var on=document.querySelector("main section.on").id;
  if(on==="t-inicio")renderInicio();
  if(on==="t-radar")renderRadar();
  if(on==="t-top")renderTop();
  if(on==="t-bt")renderBT();
  if(on==="t-alertas")renderAlertas();
}

// ── Service worker (offline) ──
if("serviceWorker"in navigator){navigator.serviceWorker.register("sw.js").catch(function(){})}
loadAll();
</script>
