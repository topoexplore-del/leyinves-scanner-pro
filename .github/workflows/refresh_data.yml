name: Full Refresh + Backtest (Daily)

on:
  schedule:
    # Lun-Vie 21:30 UTC ≈ 16:30 ET en invierno (EST) / 17:30 ET en verano (EDT).
    # En ambos casos es después del cierre (16:00 ET), que es lo que importa.
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt

      - name: Full data refresh + backtest
        run: python scripts/build_data.py --out-dir data
        env:
          TZ: America/New_York
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}

      - name: Check alerts (con datos frescos del cierre)
        run: python scripts/check_alerts.py
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || (git commit -m "chore: daily refresh + backtest [automated]" && git push)
